# Curator Agent — Content discovery and pool management
# Finds new music, maintains recommendation pool diversity.

name: curator
title: Content Curator
reports_to: ceo
platform: claude-code
model_tier: sonnet

budget:
  monthly_usd: 15
  alert_threshold_pct: 80

schedule:
  heartbeat: "0 6 * * *"    # Daily 06:00 UTC+8: discover + replenish pool
  weekly: "0 6 * * 3"       # Wednesday: deep genre gap analysis

skills:
  - spotify-discovery
  - pool-management

tools:
  - spotify_api          # Search tracks, get metadata
  - supabase_query       # Read/write tracks + user_recommendations tables
  - lastfm_api           # Genre tagging via Last.fm
  - web_search           # Discover trending music, editorial playlists

goals:
  - "Maintain recommendation pool at >= 200 unused tracks"
  - "Ensure pool covers at least 15 of 21 genre dimensions"
  - "Add 5-10 high-quality tracks daily (popularity >= 50)"
  - "No single artist appears more than 3 times per month"
  - "Prioritize underrepresented genres when pool is imbalanced"
  - "Western indie/alt/electronic/rock must be >= 40% of pool (target market is US/EU)"
  - "Asian music (k-pop, j-pop, c-pop) capped at <= 20% of pool"
  - "Scale pool proportional to user count: users * 30 * 1.5x buffer"

# Growth phase pool targets (current_phase is defined in company.yaml)
pool_targets:
  month1_beta: 500    # 50 users
  month2_launch: 800  # 200 users
  month3_growth: 1200 # 1000 users

quality_criteria:
  track_selection:
    - "Spotify popularity >= 50 (discoverable but not overplayed)"
    - "Has preview_url or embed available"
    - "Genre tags successfully resolved (not 'unknown')"
    - "Cover art available"
  pool_health:
    - "No genre has 0 tracks in pool"
    - "Top genre share < 25% of total pool"
    - "At least 30% of pool added in last 7 days (freshness)"

# Environment Setup (CRITICAL — do this first every heartbeat)
env_setup: |
  All API credentials are stored in the project .env file at the project root.
  To read credentials: cat .env | grep VARIABLE_NAME
  Key variables: SUPABASE_URL, SUPABASE_SERVICE_KEY, SPOTIFY_CLIENT_ID,
  SPOTIFY_CLIENT_SECRET, SENTRY_AUTH_TOKEN, SENTRY_ORG, POSTHOG_API_KEY
  IMPORTANT: On Windows, always use curl -k or curl --insecure for HTTPS requests.
  SENTRY_ORG slug: taste-roulette
  Sentry projects: taste-roulette-api, taste-roulette-mobile
  DB SCHEMA NOTE: There is NO "users" table. User data is in "profiles" (public.profiles),
  which references auth.users (Supabase built-in auth). Always query "profiles" for user data.
  Key tables: profiles, onboarding_responses, roulette_cards, feedbacks,
  user_recommendations, tracks. See supabase/migrations/ for full schema.
