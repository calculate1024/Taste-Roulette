# Taste Roulette — Paperclip Company Configuration
# An "anti-algorithm" daily music recommendation app that pushes users
# outside their taste comfort zone via anonymous peer recommendations.

name: taste-roulette
display_name: Taste Roulette
description: >
  Daily music recommendation app. Each day users receive one card from a stranger
  whose taste is different-but-not-too-far (cosine distance 0.3-0.7 sweet spot).
  Goal: maximize surprise, not accuracy.

owner: calvin
timezone: Asia/Taipei

# Infrastructure references
infrastructure:
  api: vercel          # Node.js/Express API
  database: supabase   # PostgreSQL + Auth
  mobile: expo         # React Native (EAS Build)
  monitoring: sentry   # Error tracking
  analytics: posthog   # Product analytics
  music_api: spotify   # Track metadata + search

# Global budget cap (all agents combined)
budget:
  monthly_cap_usd: 120
  alert_threshold_pct: 80  # Alert Calvin at 80% usage
  # Per-agent budget breakdown:
  # CEO $30, Curator $15, Social $12, Analytics $10, Dev-Lifecycle $10,
  # DevOps $8, Quality $5, Outreach $5, Bug-Triage $3, Feedback $3 = $101

# Approval policy — actions requiring Calvin's explicit approval
approval_required:
  - social_media_publish
  - curator_invitation_send
  - feature_flag_toggle
  - database_migration
  - budget_increase
  - architecture_refactor  # Major refactoring decisions require Calvin approval

# Development workflow references (team-readable governance)
dev_workflow:
  contributing: CONTRIBUTING.md
  workflow: docs/dev-workflow.md
  testing: docs/testing-standards.md
  code_review: docs/code-review-guidelines.md
  ci_pipeline: .github/workflows/ci.yml
  issue_templates: .github/ISSUE_TEMPLATE/
  pr_template: .github/PULL_REQUEST_TEMPLATE.md

# KPI targets (agents reference these for goal alignment)
kpi_targets:
  d7_retention: 0.30        # 30% D7 retention
  daily_open_rate: 0.60     # 60% of users open their daily card
  surprise_rate: 0.25       # 25% of feedbacks are "surprised"
  recommend_back_rate: 0.30 # 30% of users submit a recommendation
  pool_size_min: 500        # Minimum unused tracks in recommendation pool
  genre_diversity_min: 15   # At least 15 of 21 genres represented in pool

# Growth strategy: 1,000 users in 3 months (Western/English-speaking market)
growth:
  target_market: "US/EU (English-speaking)"
  budget_monthly_usd: 75   # $50-100 range, excluding Paperclip agent budget
  current_phase: "month1_beta"  # Update as phases progress
  milestones:
    month1: { users: 50, phase: "beta", focus: "Pre-launch + closed beta" }
    month2: { users: 200, phase: "launch", focus: "Public launch + organic growth" }
    month3: { users: 1000, phase: "growth", focus: "Referral + Curator acceleration" }
  launch_channels:
    primary: ["Product Hunt", "Indie Hackers", "Reddit (music subs)", "Twitter/X"]
    secondary: ["dev.to / Medium", "IG", "music podcasts"]
  pool_composition:
    western_indie_alt_electronic: ">= 40%"
    asian_music: "<= 20%"
    other_world_music: "remaining"

# Monetization roadmap — CEO agent evaluates readiness at each phase
monetization:
  core_rule: "NEVER interrupt the daily card experience with ads"
  phases:
    phase1_free:
      trigger: "0 - 5k users"
      model: "No monetization. Focus on growth and retention."
    phase2_ads_premium:
      trigger: "5k - 20k users"
      models:
        - "Rewarded Ads: watch ad → bonus card (A/B test)"
        - "Premium subscription $2.99-4.99/month (RevenueCat): 3 cards/day, reveal recommender, custom distance, taste report"
    phase3_sponsored:
      trigger: "20k - 50k users"
      models:
        - "Sponsored Cards: labels pay to place new releases, still taste-distance matched, marked 'Sponsored Discovery'"
        - "Annual Taste Report $1.99: Wrapped-style year-end report, high shareability"
    phase4_creator:
      trigger: "50k+ users"
      models:
        - "Curator paid channels $0.99/month/subscriber, platform 30% cut"
  readiness_checks:
    - "DAU threshold met for the phase?"
    - "D30 retention > 20%?"
    - "Surprise rate still > 20%?"
    - "No user complaints about commercialization in feedback?"
    - "Technical prerequisites ready? (SDK, Privacy Policy, store declarations)"
