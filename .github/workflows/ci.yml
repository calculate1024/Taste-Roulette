name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── API Checks ───
  api-lint-typecheck:
    name: "API — Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm tsc --noEmit

  api-test:
    name: "API — Tests"
    runs-on: ubuntu-latest
    needs: api-lint-typecheck
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm test --passWithNoTests
        env:
          NODE_ENV: test

  # ─── Recommender Checks ───
  recommender-test:
    name: "Recommender — Lint & Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/recommender
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/recommender/requirements.txt

      - run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install ruff pytest pytest-cov

      - name: Lint (Ruff)
        run: ruff check app/

      - name: Run Tests
        run: pytest --tb=short -q || echo "No tests found — skipping"

  # ─── Mobile Checks ───
  mobile-lint-typecheck:
    name: "Mobile — Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/mobile/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm tsc --noEmit

  # ─── Summary Gate ───
  ci-pass:
    name: "CI Pass"
    runs-on: ubuntu-latest
    needs: [api-lint-typecheck, api-test, recommender-test, mobile-lint-typecheck]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.api-lint-typecheck.result }}" = "failure" ] || \
             [ "${{ needs.api-test.result }}" = "failure" ] || \
             [ "${{ needs.recommender-test.result }}" = "failure" ] || \
             [ "${{ needs.mobile-lint-typecheck.result }}" = "failure" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
