name: PR Governance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── Auto-label by file path (cal.com pattern) ───
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  # ─── PR size labels (XS/S/M/L/XL) ───
  size-label:
    name: PR Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size:XS"
          xs_max_size: 10
          s_label: "size:S"
          s_max_size: 100
          m_label: "size:M"
          m_max_size: 400
          l_label: "size:L"
          l_max_size: 800
          xl_label: "size:XL"
          fail_if_xl: false
          message_if_xl: >
            :warning: This PR exceeds 800 lines. Please consider splitting it
            into smaller PRs (target < 400 lines per PR).
            See [CONTRIBUTING.md](../blob/dev/CONTRIBUTING.md#pull-request-流程).
          files_to_ignore: |
            pnpm-lock.yaml
            *.lock
            *.snap

  # ─── Conventional Commit PR title enforcement ───
  semantic-title:
    name: Semantic PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            perf
            test
            docs
            chore
            style
            ci
          scopes: |
            mobile
            api
            recommender
            db
            paperclip
            ci
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            PR title must follow Conventional Commits format:
            <type>(<scope>): <description>

            Examples:
              feat(api): add daily card delivery endpoint
              fix(mobile): prevent crash when preview_url is null
              chore(ci): add type-check step to CI pipeline
