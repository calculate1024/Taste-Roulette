<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Segment colors -->
    <linearGradient id="seg0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="seg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E86DE"/>
      <stop offset="100%" stop-color="#54A0FF"/>
    </linearGradient>
    <linearGradient id="seg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ABEAD"/>
      <stop offset="100%" stop-color="#1DD1A1"/>
    </linearGradient>
    <linearGradient id="seg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7B731"/>
      <stop offset="100%" stop-color="#FFC048"/>
    </linearGradient>
    <linearGradient id="seg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FC5C65"/>
      <stop offset="100%" stop-color="#FF6B81"/>
    </linearGradient>
    <linearGradient id="seg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E056A0"/>
      <stop offset="100%" stop-color="#F78FB3"/>
    </linearGradient>
    <linearGradient id="seg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4834D4"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="seg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22A6B3"/>
      <stop offset="100%" stop-color="#3DC1D3"/>
    </linearGradient>

    <!-- Center disc gradient -->
    <radialGradient id="centerGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2d2d5e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Inner shadow for center -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Segment shadow -->
    <filter id="segShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Transparent background - no rect -->

  <!-- Wheel group - scaled down with more padding for adaptive icon safe zone -->
  <!-- Android adaptive icons use 108dp with 72dp safe zone (66.7%) -->
  <!-- Scaling wheel radius from 320 to 240, centered at 512 -->
  <g filter="url(#shadow)">
    <!-- 8 wheel segments, radius 240 -->
    <path d="M512,512 L752,512 A240,240 0 0,1 681.88,681.88 Z" fill="url(#seg0)" filter="url(#segShadow)"/>
    <path d="M512,512 L681.88,681.88 A240,240 0 0,1 512,752 Z" fill="url(#seg1)" filter="url(#segShadow)"/>
    <path d="M512,512 L512,752 A240,240 0 0,1 342.12,681.88 Z" fill="url(#seg2)" filter="url(#segShadow)"/>
    <path d="M512,512 L342.12,681.88 A240,240 0 0,1 272,512 Z" fill="url(#seg3)" filter="url(#segShadow)"/>
    <path d="M512,512 L272,512 A240,240 0 0,1 342.12,342.12 Z" fill="url(#seg4)" filter="url(#segShadow)"/>
    <path d="M512,512 L342.12,342.12 A240,240 0 0,1 512,272 Z" fill="url(#seg5)" filter="url(#segShadow)"/>
    <path d="M512,512 L512,272 A240,240 0 0,1 681.88,342.12 Z" fill="url(#seg6)" filter="url(#segShadow)"/>
    <path d="M512,512 L681.88,342.12 A240,240 0 0,1 752,512 Z" fill="url(#seg7)" filter="url(#segShadow)"/>

    <!-- Thin divider lines -->
    <g stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round">
      <line x1="512" y1="512" x2="752" y2="512"/>
      <line x1="512" y1="512" x2="681.88" y2="681.88"/>
      <line x1="512" y1="512" x2="512" y2="752"/>
      <line x1="512" y1="512" x2="342.12" y2="681.88"/>
      <line x1="512" y1="512" x2="272" y2="512"/>
      <line x1="512" y1="512" x2="342.12" y2="342.12"/>
      <line x1="512" y1="512" x2="512" y2="272"/>
      <line x1="512" y1="512" x2="681.88" y2="342.12"/>
    </g>

    <!-- Outer ring -->
    <circle cx="512" cy="512" r="240" fill="none" stroke="url(#ringGrad)" stroke-width="2.5"/>

    <!-- Small dots at segment boundaries -->
    <g fill="rgba(255,255,255,0.35)">
      <circle cx="752" cy="512" r="3.5"/>
      <circle cx="681.88" cy="681.88" r="3.5"/>
      <circle cx="512" cy="752" r="3.5"/>
      <circle cx="342.12" cy="681.88" r="3.5"/>
      <circle cx="272" cy="512" r="3.5"/>
      <circle cx="342.12" cy="342.12" r="3.5"/>
      <circle cx="512" cy="272" r="3.5"/>
      <circle cx="681.88" cy="342.12" r="3.5"/>
    </g>
  </g>

  <!-- Center disc (vinyl record style) -->
  <g filter="url(#innerGlow)">
    <!-- Outer vinyl ring -->
    <circle cx="512" cy="512" r="90" fill="url(#centerGrad)"/>
    <circle cx="512" cy="512" r="90" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

    <!-- Vinyl grooves -->
    <circle cx="512" cy="512" r="75" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <circle cx="512" cy="512" r="64" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <circle cx="512" cy="512" r="53" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

    <!-- Center label area -->
    <circle cx="512" cy="512" r="40" fill="#2a2a55"/>
    <circle cx="512" cy="512" r="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

    <!-- Musical note icon in center -->
    <g transform="translate(512, 512) scale(0.85)" fill="rgba(255,255,255,0.9)">
      <!-- Beamed eighth notes -->
      <ellipse cx="-18" cy="18" rx="12" ry="9" transform="rotate(-20, -18, 18)"/>
      <ellipse cx="18" cy="12" rx="12" ry="9" transform="rotate(-20, 18, 12)"/>
      <rect x="-8" y="-32" width="3.5" height="50" rx="1.5"/>
      <rect x="28" y="-38" width="3.5" height="50" rx="1.5"/>
      <rect x="-8" y="-38" width="39.5" height="5" rx="2"/>
      <rect x="-8" y="-28" width="39.5" height="5" rx="2"/>
    </g>

    <!-- Tiny center hole (vinyl) -->
    <circle cx="512" cy="512" r="3" fill="#1a1a2e"/>
  </g>
</svg>