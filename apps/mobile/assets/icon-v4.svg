<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#252547"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>

    <!-- Segment colors -->
    <linearGradient id="seg0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="seg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E86DE"/>
      <stop offset="100%" stop-color="#54A0FF"/>
    </linearGradient>
    <linearGradient id="seg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ABEAD"/>
      <stop offset="100%" stop-color="#1DD1A1"/>
    </linearGradient>
    <linearGradient id="seg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7B731"/>
      <stop offset="100%" stop-color="#FFC048"/>
    </linearGradient>
    <linearGradient id="seg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FC5C65"/>
      <stop offset="100%" stop-color="#FF6B81"/>
    </linearGradient>
    <linearGradient id="seg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E056A0"/>
      <stop offset="100%" stop-color="#F78FB3"/>
    </linearGradient>
    <linearGradient id="seg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4834D4"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="seg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22A6B3"/>
      <stop offset="100%" stop-color="#3DC1D3"/>
    </linearGradient>

    <!-- Center disc gradient -->
    <radialGradient id="centerGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2d2d5e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>

    <!-- Glow effect for center -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Inner shadow for center -->
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Subtle highlight filter -->
    <filter id="segShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>

    <!-- Clip for rounded corners -->
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <g clip-path="url(#roundedSquare)">
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle radial glow behind wheel -->
    <circle cx="512" cy="512" r="420" fill="url(#glowGrad)"/>

    <!-- Wheel group -->
    <g filter="url(#shadow)">
      <!-- 8 wheel segments as pie slices, radius 320 -->
      <!-- Each segment is 45 degrees -->
      <!-- Segment 0: 0 to 45 deg -->
      <path d="M512,512 L832,512 A320,320 0 0,1 738.51,738.51 Z" fill="url(#seg0)" filter="url(#segShadow)"/>
      <!-- Segment 1: 45 to 90 deg -->
      <path d="M512,512 L738.51,738.51 A320,320 0 0,1 512,832 Z" fill="url(#seg1)" filter="url(#segShadow)"/>
      <!-- Segment 2: 90 to 135 deg -->
      <path d="M512,512 L512,832 A320,320 0 0,1 285.49,738.51 Z" fill="url(#seg2)" filter="url(#segShadow)"/>
      <!-- Segment 3: 135 to 180 deg -->
      <path d="M512,512 L285.49,738.51 A320,320 0 0,1 192,512 Z" fill="url(#seg3)" filter="url(#segShadow)"/>
      <!-- Segment 4: 180 to 225 deg -->
      <path d="M512,512 L192,512 A320,320 0 0,1 285.49,285.49 Z" fill="url(#seg4)" filter="url(#segShadow)"/>
      <!-- Segment 5: 225 to 270 deg -->
      <path d="M512,512 L285.49,285.49 A320,320 0 0,1 512,192 Z" fill="url(#seg5)" filter="url(#segShadow)"/>
      <!-- Segment 6: 270 to 315 deg -->
      <path d="M512,512 L512,192 A320,320 0 0,1 738.51,285.49 Z" fill="url(#seg6)" filter="url(#segShadow)"/>
      <!-- Segment 7: 315 to 360 deg -->
      <path d="M512,512 L738.51,285.49 A320,320 0 0,1 832,512 Z" fill="url(#seg7)" filter="url(#segShadow)"/>

      <!-- Thin divider lines between segments -->
      <g stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round">
        <line x1="512" y1="512" x2="832" y2="512"/>
        <line x1="512" y1="512" x2="738.51" y2="738.51"/>
        <line x1="512" y1="512" x2="512" y2="832"/>
        <line x1="512" y1="512" x2="285.49" y2="738.51"/>
        <line x1="512" y1="512" x2="192" y2="512"/>
        <line x1="512" y1="512" x2="285.49" y2="285.49"/>
        <line x1="512" y1="512" x2="512" y2="192"/>
        <line x1="512" y1="512" x2="738.51" y2="285.49"/>
      </g>

      <!-- Outer ring -->
      <circle cx="512" cy="512" r="320" fill="none" stroke="url(#ringGrad)" stroke-width="3"/>

      <!-- Small dots at segment boundaries on the outer edge -->
      <g fill="rgba(255,255,255,0.35)">
        <circle cx="832" cy="512" r="4"/>
        <circle cx="738.51" cy="738.51" r="4"/>
        <circle cx="512" cy="832" r="4"/>
        <circle cx="285.49" cy="738.51" r="4"/>
        <circle cx="192" cy="512" r="4"/>
        <circle cx="285.49" cy="285.49" r="4"/>
        <circle cx="512" cy="192" r="4"/>
        <circle cx="738.51" cy="285.49" r="4"/>
      </g>
    </g>

    <!-- Center disc (vinyl record style) -->
    <g filter="url(#innerGlow)">
      <!-- Outer vinyl ring -->
      <circle cx="512" cy="512" r="120" fill="url(#centerGrad)"/>
      <circle cx="512" cy="512" r="120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

      <!-- Vinyl grooves -->
      <circle cx="512" cy="512" r="100" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <circle cx="512" cy="512" r="85" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <circle cx="512" cy="512" r="70" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

      <!-- Center label area -->
      <circle cx="512" cy="512" r="52" fill="#2a2a55"/>
      <circle cx="512" cy="512" r="52" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

      <!-- Musical note icon in center -->
      <g transform="translate(512, 512) scale(1.1)" fill="rgba(255,255,255,0.9)">
        <!-- Beamed eighth notes -->
        <!-- Left note head -->
        <ellipse cx="-18" cy="18" rx="12" ry="9" transform="rotate(-20, -18, 18)"/>
        <!-- Right note head -->
        <ellipse cx="18" cy="12" rx="12" ry="9" transform="rotate(-20, 18, 12)"/>
        <!-- Left stem -->
        <rect x="-8" y="-32" width="3.5" height="50" rx="1.5"/>
        <!-- Right stem -->
        <rect x="28" y="-38" width="3.5" height="50" rx="1.5"/>
        <!-- Top beam -->
        <rect x="-8" y="-38" width="39.5" height="5" rx="2"/>
        <!-- Bottom beam -->
        <rect x="-8" y="-28" width="39.5" height="5" rx="2"/>
      </g>

      <!-- Tiny center hole (vinyl) -->
      <circle cx="512" cy="512" r="4" fill="#1a1a2e"/>
    </g>

    <!-- Subtle top highlight across entire icon -->
    <rect x="0" y="0" width="1024" height="400" fill="url(#glowGrad)" opacity="0.3"/>
  </g>
</svg>